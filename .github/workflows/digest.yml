name: Daily Digest

on:
  schedule:
    # 01:30 UTC = 07:00 AM IST (UTC+5:30)
    - cron: "30 1 * * *"
  workflow_dispatch:    # allows manual trigger from GitHub Actions UI

permissions:
  contents: write       # needed to commit the generated HTML back to the repo

jobs:
  build-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py

      - name: Commit and push digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "digest: ${{ github.run_id }} — $(date -u '+%Y-%m-%d')"
          file_pattern: "docs/*.html"
          commit_user_name: "KritiDigest Bot"
          commit_user_email: "digest-bot@users.noreply.github.com"
